<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d14;--surf:#16161f;--surf2:#1e1e2a;
  --blue:#4f8ef7;--blue2:#6366f1;--pur:#a78bfa;
  --txt:#eeeeff;--dim:#7878a0;--red:#ff4d6d;--grn:#4ade80;
}
html,body{
  height:100%;width:100%;
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
}
#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  max-width:430px;margin:0 auto;
  display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
}

/* screens */
.scr{
  position:absolute;top:0;left:0;right:0;bottom:0;
  flex-direction:column;overflow-y:auto;
  padding:0 20px 96px;display:none;
}
.scr.on{display:flex;}
.no-nav{padding-bottom:28px!important;}
.no-p{padding:0!important;}

/* btns */
.btn{
  display:block;width:100%;padding:15px;
  border:none;border-radius:14px;font-size:16px;
  font-weight:600;cursor:pointer;text-align:center;
  transition:opacity .15s,transform .1s;
}
.btn:active{transform:scale(.97);}
.btn+.btn{margin-top:11px;}
.pri{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;}
.sec{background:var(--surf2);color:var(--txt);}
.gho{background:transparent;color:var(--dim);border:1.5px solid var(--surf2);}
.dan{background:rgba(255,77,109,.12);color:var(--red);border:1.5px solid var(--red);}

/* inputs */
.ig{margin-bottom:14px;}
.ig label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px;font-weight:500;}
input,select{
  width:100%;padding:13px 15px;
  background:var(--surf2);border:1.5px solid #2a2a3a;
  border-radius:12px;color:var(--txt);font-size:15px;
  outline:none;-webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--blue);}
select option{background:#1e1e2a;}

.errbox{
  background:rgba(255,77,109,.12);border:1px solid var(--red);
  color:var(--red);padding:11px 14px;border-radius:10px;
  font-size:14px;margin-bottom:14px;
}

/* nav */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surf);border-top:1px solid #202030;
  padding:10px 0 24px;display:none;justify-content:space-around;
  z-index:50;
}
#nav.on{display:flex;}
.nb{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 20px;color:var(--dim);
  font-size:11px;font-weight:500;
}
.nb.act{color:var(--blue);}
.ni{font-size:22px;}

/* ─ WELCOME ─ */
#sw{justify-content:center;align-items:center;padding:40px 28px 40px!important;}
.wlogo{
  font-size:64px;font-weight:900;letter-spacing:-3px;text-align:center;
  background:linear-gradient(135deg,var(--blue),var(--pur));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.wheart{text-align:center;font-size:28px;margin:-4px 0 4px;}
.wtag{text-align:center;color:var(--dim);font-size:14px;line-height:1.5;margin-bottom:44px;}
.wbtns{width:100%;}
.dhint{text-align:center;color:var(--dim);font-size:13px;margin-top:20px;}
.dhint a{color:var(--blue);text-decoration:none;font-weight:600;}

/* ─ AUTH ─ */
#sl,#sr{padding-top:20px!important;}
.back{background:none;border:none;color:var(--blue);font-size:17px;
  cursor:pointer;padding:0;margin-bottom:26px;display:flex;align-items:center;gap:3px;}
.alogo{font-size:38px;font-weight:900;text-align:center;letter-spacing:-2px;
  background:linear-gradient(135deg,var(--blue),var(--pur));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.atag{text-align:center;color:var(--dim);font-size:13px;margin-bottom:24px;}

/* ─ SWIPE ─ */
#ss{padding:16px 16px 90px!important;}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.slogo{font-size:26px;font-weight:900;
  background:linear-gradient(135deg,var(--blue),var(--pur));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.spill{background:var(--surf2);border-radius:20px;padding:5px 13px;font-size:13px;color:var(--dim);}

#ca{position:relative;flex:1;min-height:440px;}

.card{
  position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:22px;overflow:hidden;
  background:var(--surf);box-shadow:0 10px 40px rgba(0,0,0,.5);
  user-select:none;-webkit-user-select:none;
}
.card.top{z-index:10;cursor:grab;}
.card.bk{z-index:5;transform:scale(.95) translateY(14px);}
.card.gl{transition:transform .35s ease,opacity .35s;
  transform:translateX(-140%) rotate(-20deg)!important;opacity:0;}
.card.gr{transition:transform .35s ease,opacity .35s;
  transform:translateX(140%) rotate(20deg)!important;opacity:0;}

.ci{width:100%;height:62%;display:flex;align-items:center;
  justify-content:center;position:relative;
  background:linear-gradient(160deg,#0e1836,#1a0e36);}
.cem{font-size:80px;pointer-events:none;}

.stmp{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:22px;font-weight:900;padding:7px 15px;
  border-radius:8px;border:3px solid;letter-spacing:2px;opacity:0;
}
.slike{left:16px;color:var(--grn);border-color:var(--grn);}
.spass{right:16px;color:var(--red);border-color:var(--red);}
.sl .slike,.sl .stmp.slike{opacity:1;}
.sp .spass,.sp .stmp.spass{opacity:1;}

.cbod{padding:14px;}
.cnm{font-size:22px;font-weight:700;}
.cloc{color:var(--dim);font-size:13px;margin-top:2px;}
.cbio{font-size:14px;color:rgba(238,238,255,.75);margin-top:8px;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.csc{display:flex;align-items:center;gap:8px;margin-top:10px;}
.csb{flex:1;height:4px;background:#222;border-radius:2px;overflow:hidden;}
.csf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--pur));}
.csl{font-size:11px;color:var(--dim);}
.vbdg{color:var(--blue);font-size:13px;margin-left:3px;}

.acts{display:flex;justify-content:center;align-items:center;gap:18px;padding:12px 0 4px;}
.act{border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.act:active{transform:scale(.86);}
.aundo{width:46px;height:46px;font-size:18px;background:var(--surf2);color:var(--txt);}
.apass{width:64px;height:64px;font-size:26px;background:var(--surf2);color:var(--txt);}
.alike{width:64px;height:64px;font-size:26px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;}

.empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:14px;color:var(--dim);}
.empty .ei{font-size:50px;}
.empty p{font-size:15px;text-align:center;line-height:1.5;}

/* ─ MATCHES ─ */
#sm{padding-top:24px!important;}
.shdr{font-size:22px;font-weight:700;margin-bottom:18px;}
.mr{display:flex;align-items:center;gap:14px;padding:13px 0;
  border-bottom:1px solid #1a1a28;cursor:pointer;}
.mr:active{opacity:.6;}
.mav{width:54px;height:54px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#0e1836,#1a0e36);
  display:flex;align-items:center;justify-content:center;font-size:24px;}
.mi{flex:1;min-width:0;}
.mn{font-weight:600;font-size:15px;}
.mp{color:var(--dim);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.mt{color:var(--dim);font-size:12px;flex-shrink:0;}
.nomat{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;color:var(--dim);text-align:center;}
.nomat .ei{font-size:48px;}

/* ─ CHAT ─ */
#sc{padding:0!important;}
.chd{display:flex;align-items:center;gap:12px;padding:13px 18px;
  background:var(--surf);border-bottom:1px solid #202030;flex-shrink:0;}
.cbk{font-size:26px;cursor:pointer;color:var(--blue);line-height:1;}
.cav{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#0e1836,#1a0e36);
  display:flex;align-items:center;justify-content:center;font-size:17px;}
.cname{font-size:17px;font-weight:600;}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;
  display:flex;flex-direction:column;gap:9px;padding-bottom:80px;}
.msg{max-width:75%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.45;}
.me{background:linear-gradient(135deg,var(--blue),var(--blue2));
  align-self:flex-end;border-bottom-right-radius:4px;}
.them{background:var(--surf2);align-self:flex-start;border-bottom-left-radius:4px;}
.cbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;display:flex;gap:9px;
  padding:10px 16px 26px;background:var(--surf);border-top:1px solid #202030;}
.cbar input{flex:1;border-radius:24px;padding:10px 15px;}
.sbtn{width:43px;height:43px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border:none;color:#fff;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}

/* ─ PROFILE ─ */
#sp{padding-top:24px!important;}
.pc{background:var(--surf);border-radius:16px;padding:22px;margin-bottom:14px;text-align:center;}
.pav{width:82px;height:82px;border-radius:50%;
  background:linear-gradient(135deg,#0e1836,#1a0e36);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin:0 auto 12px;}
.pn{font-size:22px;font-weight:700;}
.pm{color:var(--dim);font-size:14px;margin-top:4px;}
.pb{font-size:14px;color:rgba(238,238,255,.75);margin-top:10px;line-height:1.5;}
.stats{display:flex;gap:10px;margin-bottom:14px;}
.stat{flex:1;background:var(--surf);border-radius:12px;padding:14px;text-align:center;}
.sv{font-size:22px;font-weight:700;color:var(--blue);}
.sl2{font-size:11px;color:var(--dim);margin-top:2px;}
.mitem{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surf);border-radius:12px;margin-bottom:8px;cursor:pointer;}
.mil{display:flex;align-items:center;gap:12px;font-size:15px;}
.mico{font-size:19px;}
.marr{color:var(--dim);}
.sechd{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);margin:18px 0 8px;}

/* ─ MODAL ─ */
#mmod{position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.88);display:none;
  align-items:center;justify-content:center;z-index:200;padding:20px;}
#mmod.on{display:flex;}
.mmc{background:var(--surf);border-radius:24px;padding:38px 26px;
  text-align:center;width:100%;max-width:350px;}
.mmtit{font-size:32px;font-weight:900;
  background:linear-gradient(135deg,var(--blue),var(--pur));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;}
.mmsub{color:var(--dim);font-size:15px;margin-bottom:28px;}
.mmem{font-size:54px;margin-bottom:28px;display:flex;justify-content:center;gap:6px;}

/* spinner */
.spin{width:28px;height:28px;border:2.5px solid var(--surf2);
  border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ld{display:flex;align-items:center;justify-content:center;
  flex:1;min-height:100px;flex-direction:column;gap:11px;color:var(--dim);}
</style>
</head>
<body>
<div id="app">

<!-- WELCOME (visible by default) -->
<div id="sw" class="scr no-nav on">
  <div class="wlogo">WHY</div>
  <div class="wheart">?❤️?</div>
  <p class="wtag">The dating app where<br>curiosity meets connection</p>
  <div class="wbtns">
    <button class="btn pri" onclick="go('r')">Create Account</button>
    <button class="btn sec" onclick="go('l')">Sign In</button>
  </div>
  <p class="dhint">Test account? <a href="#" onclick="demoFill();return false">Use demo login →</a></p>
</div>

<!-- LOGIN -->
<div id="sl" class="scr no-nav">
  <button class="back" onclick="go('w')">‹ Back</button>
  <div class="alogo">WHY</div>
  <p class="atag">Welcome back</p>
  <div id="lerr"></div>
  <div class="ig"><label>Email</label>
    <input type="email" id="lem" placeholder="you@example.com" autocomplete="email"></div>
  <div class="ig"><label>Password</label>
    <input type="password" id="lpw" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')login()"></div>
  <button class="btn pri" onclick="login()">Sign In</button>
  <button class="btn gho" onclick="go('r')">No account? Sign up</button>
</div>

<!-- REGISTER -->
<div id="sr" class="scr no-nav">
  <button class="back" onclick="go('w')">‹ Back</button>
  <div class="alogo">WHY</div>
  <p class="atag">Join the curiosity</p>
  <div id="rerr"></div>
  <div class="ig"><label>First Name</label>
    <input type="text" id="rn" placeholder="Your name"></div>
  <div class="ig"><label>Email</label>
    <input type="email" id="re" placeholder="you@example.com" autocomplete="email"></div>
  <div class="ig"><label>Password</label>
    <input type="password" id="rp" placeholder="At least 8 characters"></div>
  <div class="ig"><label>Date of Birth</label>
    <input type="date" id="rd"></div>
  <div class="ig"><label>I am a…</label>
    <select id="rg">
      <option value="">Select</option>
      <option value="man">Man</option>
      <option value="woman">Woman</option>
      <option value="nonbinary">Nonbinary</option>
    </select></div>
  <div class="ig"><label>Looking for…</label>
    <select id="rs">
      <option value="all">Everyone</option>
      <option value="man">Men</option>
      <option value="woman">Women</option>
      <option value="nonbinary">Nonbinary people</option>
    </select></div>
  <button class="btn pri" onclick="reg()">Create Account</button>
  <button class="btn gho" onclick="go('l')">Have an account?</button>
  <div style="height:20px"></div>
</div>

<!-- SWIPE -->
<div id="ss" class="scr">
  <div class="shd">
    <span class="slogo">WHY</span>
    <span class="spill" id="srem">…</span>
  </div>
  <div id="ca"><div class="ld"><div class="spin"></div><span>Loading…</span></div></div>
  <div class="acts" id="sacts" style="display:none">
    <button class="act aundo" onclick="undo()">↩</button>
    <button class="act apass" onclick="swipe('left')">✕</button>
    <button class="act alike" onclick="swipe('right')">♥</button>
  </div>
</div>

<!-- MATCHES -->
<div id="sm" class="scr">
  <div class="shdr">Matches</div>
  <div id="mlist"><div class="ld"><div class="spin"></div></div></div>
</div>

<!-- CHAT -->
<div id="sc" class="scr no-p">
  <div class="chd">
    <span class="cbk" onclick="go('m')">‹</span>
    <div class="cav" id="cav">👤</div>
    <span class="cname" id="cname">Chat</span>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="cbar">
    <input type="text" id="cin" placeholder="Message…"
      onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="sbtn" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- PROFILE -->
<div id="sp" class="scr">
  <div class="shdr">Profile</div>
  <div id="pcont"><div class="ld"><div class="spin"></div></div></div>
</div>

<!-- NAV -->
<nav id="nav">
  <div class="nb act" id="nb-s" onclick="tab('s')"><span class="ni">🔥</span><span>Discover</span></div>
  <div class="nb" id="nb-m" onclick="tab('m')"><span class="ni">💬</span><span>Matches</span></div>
  <div class="nb" id="nb-p" onclick="tab('p')"><span class="ni">👤</span><span>Profile</span></div>
</nav>

<!-- MATCH MODAL -->
<div id="mmod">
  <div class="mmc">
    <div class="mmtit">It's a Match!</div>
    <p class="mmsub">You and <strong id="mmn">someone</strong> liked each other ✨</p>
    <div class="mmem"><span>😍</span><span>❤️</span><span id="mmem">🥰</span></div>
    <button class="btn pri" onclick="closeMatch(true)">Send a Message</button>
    <button class="btn gho" style="margin-top:10px" onclick="closeMatch(false)">Keep Swiping</button>
  </div>
</div>

</div>
<script>
var API='https://urbaniq-production-3433.up.railway.app/api';
var tok=null,me=null,stk=[],chatId=null,pendMatch=null;

try{tok=localStorage.getItem('wtok');}catch(e){}
try{me=JSON.parse(localStorage.getItem('wme')||'null');}catch(e){}

var EMOJ=['😊','🌟','✨','🦋','🎯','🌊','🔥','💫','🎭','🌈','🍀','🎸'];
function em(n){var h=0;for(var i=0;i<(n||'?').length;i++)h=(h*31+(n||'?').charCodeAt(i))&65535;return EMOJ[h%EMOJ.length];}
function age(d){if(!d)return'';var b=new Date(d),n=new Date(),a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a;}

function go(id){
  var ids=['w','l','r','s','m','c','p'];
  ids.forEach(function(x){var e=document.getElementById('s'+x);if(e)e.className=e.className.replace(/\bon\b/,'').trim();});
  var el=document.getElementById('s'+id);
  if(el){el.className+=' on';}
  var nav=document.getElementById('nav');
  if(id==='s'||id==='m'||id==='p'){
    nav.className='on';
    ['s','m','p'].forEach(function(x){var b=document.getElementById('nb-'+x);if(b)b.className=b.className.replace(/\bact\b/,'').trim();});
    var nb=document.getElementById('nb-'+id);if(nb)nb.className+=' act';
  } else {nav.className='';}
}

function tab(id){
  go(id);
  if(id==='s'&&!stk.length)loadStk();
  if(id==='m')loadMatches();
  if(id==='p')loadProfile();
}

function req(method,path,body){
  var h={'Content-Type':'application/json'};
  if(tok)h['Authorization']='Bearer '+tok;
  return fetch(API+path,{
    method:method,headers:h,
    body:body?JSON.stringify(body):undefined
  }).then(function(r){return r.json().then(function(d){
    if(!r.ok)throw new Error(d.error||d.message||'Error');return d;
  });});
}

function showErr(id,msg){var e=document.getElementById(id);if(e)e.innerHTML=msg?'<div class="errbox">'+msg+'</div>':'';}

function demoFill(){go('l');document.getElementById('lem').value='jordan@test.com';document.getElementById('lpw').value='Password123!';}

function login(){
  var email=document.getElementById('lem').value.trim();
  var pw=document.getElementById('lpw').value;
  showErr('lerr','');
  if(!email||!pw)return showErr('lerr','Fill in all fields');
  req('POST','/auth/login',{email:email,password:pw}).then(function(d){
    save(d.token,d.user);enter();
  }).catch(function(e){showErr('lerr',e.message);});
}

function reg(){
  var n=document.getElementById('rn').value.trim();
  var e=document.getElementById('re').value.trim();
  var p=document.getElementById('rp').value;
  var d=document.getElementById('rd').value;
  var g=document.getElementById('rg').value;
  var s=document.getElementById('rs').value;
  showErr('rerr','');
  if(!n||!e||!p||!d||!g)return showErr('rerr','Please fill in all fields');
  if(p.length<8)return showErr('rerr','Password needs 8+ characters');
  var sm={all:['man','woman','nonbinary'],man:['man'],woman:['woman'],nonbinary:['nonbinary']};
  req('POST','/auth/register',{
    name:n,email:e,password:p,date_of_birth:d,gender:g,seeking:sm[s]||['man','woman','nonbinary']
  }).then(function(d){
    save(d.token,d.user);
    req('PATCH','/users/me',{
      latitude:40.7128+(Math.random()-.5)*.15,
      longitude:-74.006+(Math.random()-.5)*.15,
      location_city:'New York, NY'
    }).catch(function(){});
    enter();
  }).catch(function(e){showErr('rerr',e.message);});
}

function save(t,u){
  tok=t;me=u;
  try{localStorage.setItem('wtok',t);localStorage.setItem('wme',JSON.stringify(u));}catch(e){}
}

function enter(){go('s');loadStk();}

function logout(){
  tok=null;me=null;stk=[];
  try{localStorage.removeItem('wtok');localStorage.removeItem('wme');}catch(e){}
  go('w');
}

/* SWIPE */
function loadStk(){
  var a=document.getElementById('ca');
  a.innerHTML='<div class="ld"><div class="spin"></div><span>Loading profiles…</span></div>';
  document.getElementById('sacts').style.display='none';
  req('GET','/swipes/stack').then(function(d){
    stk=d.profiles||d||[];
    req('GET','/swipes/remaining').then(function(r){
      var el=document.getElementById('srem');
      if(el)el.textContent=(me&&me.is_premium)?'∞ swipes':(r.remaining||50)+' left';
    }).catch(function(){});
    renderStk();
  }).catch(function(e){
    a.innerHTML='<div class="empty"><span class="ei">⚠️</span><p>'+e.message+'</p></div>';
  });
}

function renderStk(){
  var a=document.getElementById('ca'),acts=document.getElementById('sacts');
  if(!stk.length){
    a.innerHTML='<div class="empty"><span class="ei">🎉</span><p>You\'ve seen everyone nearby.<br>Check back later!</p></div>';
    acts.style.display='none';return;
  }
  a.innerHTML='';acts.style.display='flex';
  var n=Math.min(stk.length,2);
  for(var i=n-1;i>=0;i--)a.appendChild(mkCard(stk[i],i===0));
}

function mkCard(u,top){
  var a=age(u.date_of_birth),e=em(u.name),sc=u.curiosity_score||0;
  var d=document.createElement('div');
  d.className='card '+(top?'top':'bk');
  d.setAttribute('data-uid',u.id);
  d.innerHTML='<div class="ci"><span class="cem">'+e+'</span>'
    +'<div class="stmp slike">LIKE</div><div class="stmp spass">PASS</div></div>'
    +'<div class="cbod"><div class="cnm">'+u.name+(a?', '+a:'')
    +(u.identity_verified?'<span class="vbdg">✓</span>':'')+'</div>'
    +'<div class="cloc">'+(u.location_city||'')+'</div>'
    +(u.bio?'<div class="cbio">'+u.bio+'</div>':'')
    +'<div class="csc"><span class="csl">?</span>'
    +'<div class="csb"><div class="csf" style="width:'+sc+'%"></div></div>'
    +'<span class="csl">'+sc+'</span></div></div>';
  if(top)drag(d);
  return d;
}

function drag(card){
  var sx=0,dx=0,dn=false;
  function mv(x){if(!dn)return;dx=x-sx;card.style.transform='translateX('+dx+'px) rotate('+(dx*.05)+'deg)';
    if(dx>40){card.className=card.className.replace(/\bsl\b|\bsp\b/g,'').trim()+' sl';}
    else if(dx<-40){card.className=card.className.replace(/\bsl\b|\bsp\b/g,'').trim()+' sp';}
    else{card.className=card.className.replace(/\bsl\b|\bsp\b/g,'').trim();}}
  function end(){if(!dn)return;dn=false;card.style.transform='';
    card.className=card.className.replace(/\bsl\b|\bsp\b/g,'').trim();
    if(dx>90)swipe('right');else if(dx<-90)swipe('left');dx=0;}
  card.addEventListener('mousedown',function(e){sx=e.clientX;dn=true;e.preventDefault();});
  window.addEventListener('mousemove',function(e){mv(e.clientX);});
  window.addEventListener('mouseup',end);
  card.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;dn=true;},{passive:true});
  card.addEventListener('touchmove',function(e){mv(e.touches[0].clientX);},{passive:true});
  card.addEventListener('touchend',end);
}

function swipe(dir){
  if(!stk.length)return;
  var u=stk[0];
  var top=document.querySelector('.card.top');
  if(top){top.className+=(dir==='right')?' gr':' gl';setTimeout(function(){if(top.parentNode)top.parentNode.removeChild(top);},380);}
  stk.shift();
  var bk=document.querySelector('.card.bk');
  if(bk){setTimeout(function(){bk.className=bk.className.replace('bk','top');drag(bk);
    if(stk.length>1){var nxt=mkCard(stk[1],false);var a=document.getElementById('ca');if(a)a.insertBefore(nxt,bk);}},220);}
  if(!stk.length)setTimeout(renderStk,420);
  req('POST','/swipes',{swiped_id:u.id,direction:dir}).then(function(r){
    if(r.match){pendMatch=r.match_id;
      document.getElementById('mmn').textContent=u.name;
      document.getElementById('mmem').textContent=em(u.name);
      document.getElementById('mmod').className='on';}
  }).catch(function(){});
}

function undo(){req('POST','/swipes/undo').then(function(){loadStk();}).catch(function(){});}

function closeMatch(chat){
  document.getElementById('mmod').className='';
  if(chat&&pendMatch)openChat(pendMatch,document.getElementById('mmn').textContent);
  pendMatch=null;
}

/* MATCHES */
function loadMatches(){
  var el=document.getElementById('mlist');
  el.innerHTML='<div class="ld"><div class="spin"></div></div>';
  req('GET','/matches').then(function(d){
    var list=d.matches||d||[];
    if(!list.length){el.innerHTML='<div class="nomat"><span class="ei">💬</span><p>No matches yet.<br>Keep swiping!</p></div>';return;}
    el.innerHTML=list.map(function(m){
      var o=m.other_user||{};var e=em(o.name);
      var t=m.last_message_at?new Date(m.last_message_at).toLocaleDateString():'';
      return '<div class="mr" onclick="openChat(\''+m.id+'\',\''+o.name+'\',\''+e+'\')">'
        +'<div class="mav">'+e+'</div><div class="mi"><div class="mn">'+(o.name||'Match')+'</div>'
        +'<div class="mp">'+(m.last_message||'Say hello!')+'</div></div>'
        +'<span class="mt">'+t+'</span></div>';
    }).join('');
  }).catch(function(e){el.innerHTML='<div class="nomat"><p>'+e.message+'</p></div>';});
}

/* CHAT */
function openChat(matchId,name,e){
  chatId=matchId;
  document.getElementById('cname').textContent=name;
  document.getElementById('cav').textContent=e||em(name);
  go('c');
  var el=document.getElementById('msgs');
  el.innerHTML='<div class="ld"><div class="spin"></div></div>';
  req('GET','/messages/'+matchId).then(function(d){
    renderMsgs(d.messages||d||[]);
  }).catch(function(e){el.innerHTML='<p style="color:var(--dim);text-align:center;padding:30px">'+e.message+'</p>';});
}

function renderMsgs(list){
  var el=document.getElementById('msgs');
  if(!list.length){el.innerHTML='<p style="color:var(--dim);text-align:center;padding:30px">No messages yet. Say hi! 👋</p>';return;}
  el.innerHTML=list.map(function(m){return'<div class="msg '+(m.sender_id===(me&&me.id)?'me':'them')+'">'+m.content+'</div>';}).join('');
  el.scrollTop=el.scrollHeight;
}

function sendMsg(){
  var inp=document.getElementById('cin');
  var txt=inp.value.trim();if(!txt||!chatId)return;
  inp.value='';
  var el=document.getElementById('msgs');
  var d=document.createElement('div');d.className='msg me';d.textContent=txt;
  if(el.querySelector('p'))el.innerHTML='';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  req('POST','/messages/'+chatId,{content:txt}).catch(function(){d.style.opacity='.5';});
}

/* PROFILE */
function loadProfile(){
  var el=document.getElementById('pcont');
  el.innerHTML='<div class="ld"><div class="spin"></div></div>';
  req('GET','/users/me').then(function(d){
    var u=d.user||d;me=u;
    var a=age(u.date_of_birth),e=em(u.name);
    el.innerHTML='<div class="pc"><div class="pav">'+e+'</div>'
      +'<div class="pn">'+u.name+(u.identity_verified?' <span style="color:var(--blue)">✓</span>':'')+'</div>'
      +'<div class="pm">'+(a?a+' · ':'')+''+(u.gender||'')+' · '+(u.location_city||'No location')+'</div>'
      +(u.bio?'<div class="pb">'+u.bio+'</div>':'')+'</div>'
      +'<div class="stats">'
      +'<div class="stat"><div class="sv">'+(u.curiosity_score||0)+'</div><div class="sl2">Curiosity</div></div>'
      +'<div class="stat"><div class="sv">'+(u.is_premium?'★':'—')+'</div><div class="sl2">Premium</div></div>'
      +'<div class="stat"><div class="sv">'+(u.boosts_remaining||0)+'</div><div class="sl2">Boosts</div></div>'
      +'</div>'
      +'<div class="sechd">Account</div>'
      +'<div class="mitem" style="cursor:default"><div class="mil"><span class="mico">✉️</span><span>'+(u.email||'')+'</span></div></div>'
      +'<div class="sechd">Settings</div>'
      +'<div class="mitem dan" onclick="logout()"><div class="mil"><span class="mico">🚪</span><span>Sign Out</span></div><span class="marr">›</span></div>';
  }).catch(function(e){el.innerHTML='<p style="color:var(--dim);text-align:center;padding:30px">'+e.message+'</p>';});
}

try{var rd=document.getElementById('rd');if(rd){var mx=new Date();mx.setFullYear(mx.getFullYear()-18);rd.max=mx.toISOString().split('T')[0];}}catch(e){}

if(tok&&me){enter();}
