<!-- Instant loading screen — shown before JS parses, removed when React mounts -->
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#fff;font-family:system-ui,-apple-system,sans-serif}
  #splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99999;transition:opacity .3s ease}
  #splash.out{opacity:0;pointer-events:none}
  #splash-logo{font-size:48px;font-weight:900;letter-spacing:-1px;color:#0a0a0a;font-family:system-ui,-apple-system,sans-serif}
  #splash-sub{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#888580}
  #splash-dots{display:flex;gap:6px}
  #splash-dots span{width:8px;height:8px;border-radius:50%;background:#E0DDD8;animation:splashPulse 1.2s ease-in-out infinite}
  #splash-dots span:nth-child(2){animation-delay:.2s}
  #splash-dots span:nth-child(3){animation-delay:.4s}
  @keyframes splashPulse{0%,80%,100%{transform:scale(0.7);background:#E0DDD8}40%{transform:scale(1);background:#0a0a0a}}
</style>
</head>
<body>
<div id="splash">
  <div id="splash-logo">UrbanIQ</div>
  <div id="splash-sub">City Discovery</div>
  <div id="splash-dots"><span></span><span></span><span></span></div>
</div>
<div id="root"></div>
<script>
  // Remove splash once React has rendered
  var _splashRemoved=false;
  function removeSplash(){if(_splashRemoved)return;_splashRemoved=true;var s=document.getElementById('splash');if(s){s.classList.add('out');setTimeout(function(){s.remove();},350);}}
  // Fallback: remove after 4s even if React is slow
  setTimeout(removeSplash,4000);
  // MutationObserver: remove as soon as #root has children
  new MutationObserver(function(m,obs){if(document.getElementById('root')&&document.getElementById('root').childElementCount>0){obs.disconnect();removeSplash();}}).observe(document.getElementById('root')||document.body,{childList:true,subtree:true});
</script>
<script type="module" src="/src/main.tsx"></script>
</body>
