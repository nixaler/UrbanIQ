<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UrbanIQ — 28 Cards Per Sheet</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #c8c8c8;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 0.3in;
    }

    .instructions {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.8;
      letter-spacing: 0.3px;
    }
    .instructions strong { color: #111; }

    /* 4 cols × 7 rows = 28 cards on one 8.5×11 sheet */
    .sheet {
      width: 8in;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 2in);
      grid-template-rows: repeat(7, 1.5in);
      background: white;
      box-shadow: 0 4px 40px rgba(0,0,0,0.3);
    }

    /* 2" × 1.5" card */
    .card {
      width: 2in;
      height: 1.5in;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.1in 0.1in 0.1in 0.12in;
      outline: 0.5pt dashed #bbb;
    }

    /* LEFT: branding */
    .left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 5px;
      flex: 1;
    }

    .dots-row {
      display: flex;
      gap: 3px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .wordmark {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      display: flex;
      align-items: baseline;
    }
    .u  { color: #E8294A; }
    .r  { color: #FF8C42; }
    .b  { color: #F5C518; }
    .a  { color: #22C55E; }
    .n  { color: #007DC5; }
    .dl { color: #555; }
    .i  { color: #9B59B6; }
    .q  { color: #E8294A; }

    .subtitle {
      font-size: 5px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #aaa;
      text-transform: uppercase;
    }

    .url-line {
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #111;
      display: flex;
      align-items: center;
      gap: 1px;
    }
    .url-line .dot-accent { color: #007DC5; }
    .url-line .sep        { color: #ccc; margin: 0 3px; font-weight: 400; }
    .url-line .quest      { color: #22C55E; }

    /* RIGHT: QR */
    .right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      margin-left: 6px;
    }

    .qr-wrap {
      border: 1px solid #eee;
      border-radius: 5px;
      padding: 3px;
      background: white;
    }
    .qr-wrap img {
      display: block;
      width: 0.57in;
      height: 0.57in;
      image-rendering: pixelated;
    }

    .scan-label {
      font-size: 4.5px;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* PRINT */
    @media print {
      body {
        background: white;
        padding: 0.25in;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .instructions { display: none; }
      .sheet { box-shadow: none; }
      .card { outline: 0.25pt solid #ddd; }
    }
  </style>
</head>
<body>

<p class="instructions">

<div class="sheet" id="sheet"></div>

</body>
</html>
