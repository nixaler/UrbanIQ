<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UrbanIQ — Print Cards</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d0d0d0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 0.45in;
    }

    .instructions {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      line-height: 1.7;
    }
    .instructions strong { color: #111; }

    /* 2 columns × 4 rows = 8 cards per sheet */
    .sheet {
      width: 7.5in;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 3.5in);
      background: white;
      box-shadow: 0 4px 40px rgba(0,0,0,0.25);
    }

    /* 3.5" × 2.5" each */
    .card {
      width: 3.5in;
      height: 2.5in;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.18in 0.2in;
      outline: 0.5pt dashed #ccc;
      gap: 0;
    }

    /* ── TRANSIT DOTS ── */
    .dots-row {
      display: flex;
      gap: 5px;
      margin-bottom: 9px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* ── WORDMARK ── */
    .wordmark {
      font-size: 50px;
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      margin-bottom: 5px;
      display: flex;
      align-items: baseline;
    }
    .u  { color: #E8294A; }
    .r  { color: #FF8C42; }
    .b  { color: #F5C518; }
    .a  { color: #22C55E; }
    .n  { color: #007DC5; }
    .dl { color: #555; font-size: 46px; }
    .i  { color: #9B59B6; }
    .q  { color: #E8294A; }

    /* ── SUBTITLE ── */
    .subtitle {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 3.5px;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 9px;
    }

    /* ── CITY PILLS ── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .pill {
      border-radius: 20px;
      border: 1.5px solid;
      padding: 2.5px 8px;
      font-size: 6px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── BOTTOM ROW ── */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .url-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .url-line {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      color: #111;
    }
    .url-line .accent { color: #007DC5; }
    .url-line .sep    { color: #ccc; margin: 0 4px; font-weight: 400; font-size: 11px; }
    .url-line .quest  { color: #22C55E; }

    .scan-hint {
      font-size: 6px;
      color: #bbb;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .qr-wrap {
      border: 1.5px solid #eee;
      border-radius: 8px;
      padding: 4px;
      background: white;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }
    .qr-wrap img {
      display: block;
      width: 0.7in;
      height: 0.7in;
      image-rendering: pixelated;
    }

    /* ── PRINT ── */
    @media print {
      body {
        background: white;
        padding: 0.25in 0.5in;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .instructions { display: none; }
      .sheet { box-shadow: none; }
      .card { outline: 0.25pt solid #ddd; }
    }
  </style>
</head>
<body>
