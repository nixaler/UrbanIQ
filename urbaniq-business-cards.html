<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UrbanIQ — 28 Cards Per Sheet</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #c0c0c0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 0.3in;
    }

    .instructions {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.8;
    }
    .instructions strong { color: #111; }

    /* 4 cols × 7 rows = 28 per sheet */
    .sheet {
      width: 8in;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 2in);
      grid-template-rows: repeat(7, 1.5in);
      background: white;
      box-shadow: 0 4px 40px rgba(0,0,0,0.3);
    }

    .card {
      width: 2in;
      height: 1.5in;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.08in 0.1in;
      outline: 0.5pt dashed #bbb;
      gap: 4px;
    }

    /* Transit dots */
    .dots {
      display: flex;
      gap: 4px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    /* Wordmark */
    .wordmark {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
      display: flex;
      align-items: baseline;
    }
    .u  { color: #E8294A; }
    .r  { color: #FF8C42; }
    .b  { color: #F5C518; }
    .a  { color: #22C55E; }
    .n  { color: #007DC5; }
    .dl { color: #555555; }
    .i  { color: #9B59B6; }
    .q  { color: #E8294A; }

    /* Subtitle */
    .subtitle {
      font-size: 5px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #aaa;
      text-transform: uppercase;
    }

    /* QR */
    .qr-wrap {
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 3px;
      background: white;
    }
    .qr-wrap img {
      display: block;
      width: 0.6in;
      height: 0.6in;
      image-rendering: pixelated;
    }

    /* URL */
    .url {
      font-size: 7.5px;
      font-weight: 800;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
    }
    .accent { color: #007DC5; }
    .sep    { color: #ccc; margin: 0 3px; font-weight: 400; }
    .quest  { color: #22C55E; }

    .scan {
      font-size: 4.5px;
      font-weight: 700;
      color: #ccc;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    @media print {
      body {
        background: white;
        padding: 0.25in;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .instructions { display: none; }
      .sheet { box-shadow: none; }
      .card { outline: 0.25pt solid #ddd; }
    }
  </style>
</head>
<body>

<p class="instructions">
  <strong>28 cards per sheet · 2" × 1.5"</strong><br>
  Chrome → Cmd+P → Letter · Scale 100% · Margins: Minimum · ✅ Background graphics → Cardstock → Cut on dashed lines
</p>

<div class="sheet" id="sheet"></div>

</body>
</html>
