<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UrbanIQ — Hype Intro Preview</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;font-family:'JetBrains Mono',monospace;}

  #intro{
    position:fixed;inset:0;background:#000;z-index:9999;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }

  /* ── MAP GRID BACKGROUND ── */
  #grid-canvas{position:absolute;inset:0;opacity:0;animation:gridFadeIn .8s .2s ease forwards;}
  @keyframes gridFadeIn{to{opacity:1;}}

  /* ── SCAN LINE ── */
  .scanline{
    position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,200,120,.6),transparent);
    animation:scan 10s linear forwards;
    z-index:2;
  }
  @keyframes scan{0%{top:0%}100%{top:100%}}

  /* ── CITY FLICKER WORDS ── */
  .city-flash{
    position:absolute;font-size:11px;letter-spacing:3px;font-weight:700;
    color:rgba(255,255,255,0.07);text-transform:uppercase;
    animation:cityFlicker 0s linear forwards;
    pointer-events:none;z-index:1;
  }
  @keyframes cityFlicker{
    0%{opacity:0}5%{opacity:1}10%{opacity:.3}15%{opacity:.9}20%{opacity:0}100%{opacity:0}
  }

  /* ── METRO LINE STREAKS ── */
  .streak{
    position:absolute;height:2px;border-radius:1px;
    animation:streakAnim linear forwards;
    z-index:2;
  }
  @keyframes streakAnim{
    0%{width:0;opacity:0}10%{opacity:1}80%{opacity:.7}100%{width:var(--w);opacity:0}
  }

  /* ── CENTER CONTENT ── */
  #center{
    position:relative;z-index:10;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:0;
  }

  /* PHASE 1 — city names cycling */
  #phase-cities{
    position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;
    animation:phaseFadeOut .5s 2.8s ease forwards;
  }
  .p1-city{
    font-size:clamp(28px,7vw,64px);font-weight:700;letter-spacing:4px;
    color:transparent;
    background-clip:text;-webkit-background-clip:text;
    opacity:0;
  }
  .p1-city:nth-child(1){background-image:linear-gradient(90deg,#028A48,#03c96a);animation:citySlide .35s .1s ease forwards;}
  .p1-city:nth-child(2){background-image:linear-gradient(90deg,#BF0000,#ff4444);animation:citySlide .35s .55s ease forwards;}
  .p1-city:nth-child(3){background-image:linear-gradient(90deg,#0039A6,#3388ff);animation:citySlide .35s 1.0s ease forwards;}
  .p1-city:nth-child(4){background-image:linear-gradient(90deg,#E3051B,#ff6644);animation:citySlide .35s 1.45s ease forwards;}
  .p1-city:nth-child(5){background-image:linear-gradient(90deg,#C60C30,#ff4488);animation:citySlide .35s 1.9s ease forwards;}
  @keyframes citySlide{
    0%{opacity:0;transform:translateX(-30px)}
    40%{opacity:1;transform:translateX(4px)}
    70%{opacity:1;transform:translateX(0)}
    100%{opacity:0;transform:translateX(30px)}
  }

  /* PHASE 2 — logo reveal */
  #phase-logo{opacity:0;animation:logoReveal .7s 3.0s cubic-bezier(.2,0,.2,1) forwards;}
  @keyframes logoReveal{
    0%{opacity:0;transform:scale(.85)}
    60%{opacity:1;transform:scale(1.04)}
    100%{opacity:1;transform:scale(1)}
  }

  #logo-word{
    font-family:'Cinzel',serif;
    font-size:clamp(52px,13vw,120px);
    font-weight:900;letter-spacing:6px;line-height:1;
    background:linear-gradient(90deg,#028A48,#00e87a,#0060ff,#028A48);
    background-size:300% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:logoShimmer 3s 3.5s linear infinite;
  }
  @keyframes logoShimmer{
    0%{background-position:0% center}100%{background-position:300% center}
  }

  #logo-iq{
    font-family:'Cinzel',serif;
    font-size:clamp(52px,13vw,120px);
    font-weight:900;letter-spacing:6px;line-height:1;
    color:#fff;
  }

  #tagline{
    font-size:clamp(9px,2vw,13px);letter-spacing:5px;
    color:rgba(255,255,255,0.35);margin-top:10px;
    opacity:0;animation:fadeUp .5s 3.7s ease forwards;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* PHASE 3 — stats/cities grid */
  #phase-stats{
    margin-top:28px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    opacity:0;animation:fadeUp .6s 4.3s ease forwards;
  }
  .stat-chip{
    border-radius:6px;padding:8px 14px;text-align:center;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
  }
  .stat-num{font-size:clamp(18px,4vw,28px);font-weight:700;color:#fff;line-height:1;}
  .stat-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-top:2px;}

  /* PHASE 4 — CTA */
  #phase-cta{
    margin-top:32px;display:flex;flex-direction:column;align-items:center;gap:10px;
    opacity:0;animation:fadeUp .6s 5.6s ease forwards;
  }
  #cta-line{
    width:0;height:1px;background:linear-gradient(90deg,transparent,#00e87a,transparent);
    animation:ctaLine .8s 5.5s ease forwards;
  }
  @keyframes ctaLine{to{width:200px}}

  #cta-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:clamp(10px,2.5vw,14px);letter-spacing:4px;font-weight:700;
    color:#fff;background:linear-gradient(135deg,#028A48,#0060ff);
    border:none;border-radius:30px;padding:14px 40px;cursor:pointer;
    position:relative;overflow:hidden;
    animation:ctaPulse 2s 6.5s ease infinite;
  }
  #cta-btn::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
    border-radius:inherit;
  }
  @keyframes ctaPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(0,232,122,.4)}
    50%{box-shadow:0 0 0 12px rgba(0,232,122,0)}
  }

  #cta-sub{
    font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.2);
    opacity:0;animation:fadeUp .5s 6.2s ease forwards;
  }

  /* PHASE 5 — progress bar */
  #progress-bar{
    position:absolute;bottom:0;left:0;height:2px;
    background:linear-gradient(90deg,#028A48,#0060ff);
    animation:progressFill 10s linear forwards;
    z-index:20;
  }
  @keyframes progressFill{from{width:0}to{width:100%}}

  /* SKIP BUTTON */
  #skip-btn{
    position:absolute;top:20px;right:20px;z-index:30;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;padding:7px 16px;cursor:pointer;
    transition:color .2s,border-color .2s,background .2s;
    animation:skipAppear .4s .5s ease both;
  }
  #skip-btn:hover{color:#fff;border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.08);}
  @keyframes skipAppear{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

  /* SKIP countdown ring */
  #skip-ring{
    position:absolute;top:14px;right:14px;width:38px;height:38px;
    pointer-events:none;z-index:31;
  }
  #skip-ring circle{
    fill:none;stroke:rgba(0,232,122,.5);stroke-width:2;
    stroke-dasharray:113;stroke-dashoffset:113;
    animation:ringDrain 10s linear forwards;
    transform-origin:center;transform:rotate(-90deg);
  }
  @keyframes ringDrain{to{stroke-dashoffset:0}}

  /* FADE OUT */
  #intro.fade-out{animation:introOut .6s ease forwards;}
  @keyframes introOut{to{opacity:0;pointer-events:none}}

  @keyframes phaseFadeOut{to{opacity:0;transform:scale(.9);pointer-events:none}}
</style>
</head>
<body>

<div id="intro">
  <canvas id="grid-canvas"></canvas>
  <div class="scanline"></div>
  <div id="progress-bar"></div>

  <!-- Skip -->
  <button id="skip-btn" onclick="skipIntro()">SKIP ▶</button>
  <svg id="skip-ring" viewBox="0 0 38 38">
    <circle cx="19" cy="19" r="18"/>
  </svg>

  <!-- Center stage -->
  <div id="center">

    <!-- Phase 1: City names -->
    <div id="phase-cities">
      <div class="p1-city">PORTLAND</div>
      <div class="p1-city">WASHINGTON DC</div>
      <div class="p1-city">NEW YORK CITY</div>
      <div class="p1-city">LOS ANGELES</div>
      <div class="p1-city">CHICAGO</div>
    </div>

    <!-- Phase 2+: Logo + everything else -->
    <div id="phase-logo">
      <div style="display:flex;align-items:baseline;justify-content:center;gap:2px;">
        <span id="logo-word">Urban</span><span id="logo-iq">IQ</span>
      </div>
      <div id="tagline">DECODE THE CITY · DAILY TRANSIT PUZZLE</div>

      <!-- Phase 3: Stats -->
      <div id="phase-stats">
        <div class="stat-chip"><div class="stat-num" style="color:#028A48;">6</div><div class="stat-lbl">CITIES</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:#0060ff;">868+</div><div class="stat-lbl">STATIONS</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:#C60C30;">∞</div><div class="stat-lbl">PUZZLES</div></div>
      </div>

      <!-- Phase 4: CTA -->
      <div id="phase-cta">
        <div id="cta-line"></div>
        <button id="cta-btn" onclick="skipIntro()">PLAY TODAY'S PUZZLE</button>
        <div id="cta-sub">FREE · NO ACCOUNT NEEDED</div>
      </div>
    </div>

  </div>
</div>

<div style="background:#080c12;color:#fff;padding:40px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;color:rgba(255,255,255,0.3);">
  ← Your app lives here
</div>

<script>
// ── CANVAS: animated metro map grid ──────────────────────────
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
let W, H, dots = [], lines = [];

const COLORS = ['#028A48','#BF0000','#0039A6','#E3051B','#C60C30','#003087','#FF6319'];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initDots();
}

function initDots() {
  dots = [];
  for (let i = 0; i < 55; i++) {
    dots.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2.5 + 1,
      c: COLORS[Math.floor(Math.random() * COLORS.length)],
      pulse: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.01,
    });
  }
  // connect nearby dots as metro lines
  lines = [];
  for (let i = 0; i < dots.length; i++) {
    for (let j = i + 1; j < dots.length; j++) {
      const dx = dots[i].x - dots[j].x;
      const dy = dots[i].y - dots[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 160) {
        lines.push({ a: i, b: j, alpha: (1 - d / 160) * 0.18 });
      }
    }
  }
}

let startTime = performance.now();
function draw(now) {
  const t = (now - startTime) / 1000;
  ctx.clearRect(0, 0, W, H);
  const fadeIn = Math.min(1, t / 1.5);

  // Lines
  lines.forEach(l => {
    const a = dots[l.a], b = dots[l.b];
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(255,255,255,${l.alpha * fadeIn})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Dots
  dots.forEach(d => {
    const pulse = (Math.sin(d.pulse + t * d.speed * 60) + 1) / 2;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r * (0.7 + pulse * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = d.c + Math.round(fadeIn * (0.3 + pulse * 0.5) * 255).toString(16).padStart(2,'0');
    ctx.fill();
  });

  if (!done) requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
window.addEventListener('resize', resize);
resize();

// ── METRO LINE STREAKS ──────────────────────────────────────
const intro = document.getElementById('intro');
const streakData = [
  { color:'#028A48', top:'18%', left:'0', delay:'.3s', dur:'1.8s', w:'55vw' },
  { color:'#BF0000', top:'35%', left:'20vw', delay:'.9s', dur:'2.2s', w:'70vw' },
  { color:'#0039A6', top:'55%', left:'5vw', delay:'1.4s', dur:'1.6s', w:'50vw' },
  { color:'#E3051B', top:'72%', left:'30vw', delay:'2.0s', dur:'2.0s', w:'60vw' },
  { color:'#C60C30', top:'85%', left:'0', delay:'2.5s', dur:'1.5s', w:'40vw' },
  { color:'#FF6319', top:'10%', right:'0', left:'auto', delay:'1.1s', dur:'2.1s', w:'45vw' },
];
streakData.forEach(s => {
  const el = document.createElement('div');
  el.className = 'streak';
  el.style.cssText = `top:${s.top};left:${s.left||'auto'};right:${s.right||'auto'};background:${s.color};animation-delay:${s.delay};animation-duration:${s.dur};--w:${s.w};`;
  intro.appendChild(el);
});

// ── CITY FLASH WORDS ─────────────────────────────────────────
const flashWords = ['METRO','TRANSIT','STATION','PLATFORM','LINE','DAILY','NETWORK','SIGNAL','RAIL','DECODE'];
flashWords.forEach((w, i) => {
  const el = document.createElement('div');
  el.className = 'city-flash';
  el.textContent = w;
  el.style.cssText = `top:${10 + Math.random()*80}%;left:${Math.random()*80}%;animation-delay:${i*0.6}s;animation-duration:3s;`;
  intro.appendChild(el);
});

// ── AUTO-DISMISS after 10s ───────────────────────────────────
let done = false;
const timer = setTimeout(() => skipIntro(), 10000);

function skipIntro() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
  }, 600);
}
</script>
</body>
</html>
